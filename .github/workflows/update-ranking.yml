name: Update Machine Ranking

on:
  schedule:
    # 毎日朝9時（日本時間）に実行 = UTC 0:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ranking update
        run: python neraime/scripts/update-ranking.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet neraime/data/machines.json || {
            git add neraime/data/machines.json
            git commit -m "Update machine ranking (auto)"
            git push
          }
