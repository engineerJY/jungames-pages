<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パチスロ狙い目判定</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Header */
        .header {
            background: #12121a;
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 1.3em;
            color: #4ade80;
            letter-spacing: 1px;
        }

        /* Container */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Search */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }
        .search-box input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .search-box input:focus {
            border-color: #4ade80;
        }
        .search-box input::placeholder {
            color: #666;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 18px;
        }

        /* Exchange Rate Toggle */
        .exchange-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .exchange-btn {
            flex: 1;
            padding: 10px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #999;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
        .exchange-btn.active {
            background: #1a2e1a;
            border-color: #4ade80;
            color: #4ade80;
        }

        /* Machine List */
        .machine-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .machine-item {
            background: #1a1a2e;
            border: 1px solid #252540;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .machine-item:hover, .machine-item:active {
            background: #252540;
        }
        .machine-item .name {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .machine-item .meta {
            font-size: 0.8em;
            color: #888;
        }
        .machine-item .ceiling {
            font-size: 0.85em;
            color: #facc15;
            margin-top: 4px;
        }

        /* Section Title */
        .section-title {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 10px;
            padding-left: 4px;
        }

        /* Judge Screen */
        .judge-screen {
            display: none;
        }
        .judge-screen.active {
            display: block;
        }
        .select-screen.hidden {
            display: none;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #4ade80;
            font-size: 15px;
            cursor: pointer;
            padding: 8px 0;
            margin-bottom: 12px;
        }

        /* Selected Machine Info */
        .machine-info {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .machine-info h2 {
            font-size: 1.15em;
            margin-bottom: 8px;
        }
        .machine-info .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #aaa;
            padding: 3px 0;
        }
        .machine-info .info-label {
            color: #888;
        }

        /* Game Count Input */
        .input-section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .input-section label {
            display: block;
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
        }
        .game-input-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .game-input {
            width: 160px;
            padding: 16px;
            background: #0a0a0f;
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            outline: none;
        }
        .game-input:focus {
            border-color: #4ade80;
        }
        .game-unit {
            font-size: 20px;
            color: #888;
        }

        /* Judge Button */
        .judge-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .judge-btn:active {
            transform: scale(0.98);
        }

        /* Result */
        .result {
            display: none;
            border-radius: 16px;
            padding: 24px 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .result.show { display: block; }
        .result.go {
            background: linear-gradient(135deg, #052e16, #14532d);
            border: 2px solid #4ade80;
        }
        .result.wait {
            background: linear-gradient(135deg, #2e2005, #422d0a);
            border: 2px solid #facc15;
        }
        .result.stop {
            background: linear-gradient(135deg, #2e0505, #531414);
            border: 2px solid #ef4444;
        }
        .result-label {
            font-size: 3em;
            font-weight: 900;
            letter-spacing: 4px;
        }
        .result.go .result-label { color: #4ade80; }
        .result.wait .result-label { color: #facc15; }
        .result.stop .result-label { color: #ef4444; }
        .result-sub {
            font-size: 1em;
            margin-top: 4px;
            color: #ccc;
        }
        .result-ev {
            font-size: 2em;
            font-weight: 700;
            margin-top: 12px;
        }
        .result.go .result-ev { color: #4ade80; }
        .result.wait .result-ev { color: #facc15; }
        .result.stop .result-ev { color: #ef4444; }
        .result-ev-label {
            font-size: 0.8em;
            color: #999;
            margin-top: 2px;
        }

        /* Detail Cards */
        .detail-cards {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .detail-cards.show {
            display: flex;
        }
        .detail-card {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-card .dc-label {
            font-size: 0.85em;
            color: #999;
        }
        .detail-card .dc-value {
            font-size: 1em;
            font-weight: 600;
        }

        /* Zone Alert */
        .zone-alert {
            display: none;
            background: #2e2005;
            border: 1px solid #facc15;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 0.9em;
        }
        .zone-alert.show { display: block; }
        .zone-alert .zone-title {
            color: #facc15;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .zone-alert .zone-detail {
            color: #ccc;
        }

        /* EV Table */
        .ev-table-section {
            display: none;
            margin-bottom: 20px;
        }
        .ev-table-section.show { display: block; }
        .ev-table-toggle {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #aaa;
            padding: 10px 16px;
            width: 100%;
            cursor: pointer;
            font-size: 0.9em;
            text-align: left;
        }
        .ev-table-toggle:hover { color: #fff; }
        .ev-table-wrap {
            display: none;
            margin-top: 8px;
        }
        .ev-table-wrap.open { display: block; }
        .ev-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82em;
        }
        .ev-table th {
            background: #1a1a2e;
            color: #888;
            padding: 8px 6px;
            text-align: right;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
        }
        .ev-table td {
            padding: 7px 6px;
            text-align: right;
            border-bottom: 1px solid #1a1a2e;
        }
        .ev-table tr.current {
            background: #1a2e1a;
        }
        .ev-table .ev-plus { color: #4ade80; }
        .ev-table .ev-minus { color: #ef4444; }

        /* Recent */
        .recent-section { margin-bottom: 20px; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 0.75em;
        }

        /* No results */
        .no-results {
            text-align: center;
            color: #666;
            padding: 40px 0;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>パチスロ狙い目判定</h1>
    </div>

    <!-- Machine Select Screen -->
    <div class="select-screen" id="selectScreen">
        <div class="container">
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="機種名で検索..." autocomplete="off">
            </div>

            <div class="exchange-toggle">
                <div class="exchange-btn active" data-rate="equal" onclick="setExchangeRate('equal')">等価交換</div>
                <div class="exchange-btn" data-rate="56" onclick="setExchangeRate('56')">5.6枚交換</div>
            </div>

            <div id="recentSection" class="recent-section" style="display:none;">
                <div class="section-title">最近使った機種</div>
                <div class="machine-list" id="recentList"></div>
            </div>

            <div class="section-title" id="allTitle">全機種</div>
            <div class="machine-list" id="machineList"></div>
        </div>
    </div>

    <!-- Judge Screen -->
    <div class="judge-screen" id="judgeScreen">
        <div class="container">
            <button class="back-btn" onclick="goBack()">&#9664; 機種選択に戻る</button>

            <div class="machine-info" id="machineInfo"></div>

            <div class="input-section">
                <label>現在のゲーム数を入力</label>
                <div class="game-input-wrap">
                    <input type="number" class="game-input" id="gameCountInput" placeholder="0" min="0" inputmode="numeric">
                    <span class="game-unit">G</span>
                </div>
            </div>

            <button class="judge-btn" onclick="judge()">判 定</button>

            <div class="result" id="result">
                <div class="result-label" id="resultLabel"></div>
                <div class="result-sub" id="resultSub"></div>
                <div class="result-ev" id="resultEv"></div>
                <div class="result-ev-label">期待値（税引前）</div>
            </div>

            <div class="zone-alert" id="zoneAlert">
                <div class="zone-title" id="zoneTitle"></div>
                <div class="zone-detail" id="zoneDetail"></div>
            </div>

            <div class="detail-cards" id="detailCards">
                <div class="detail-card">
                    <span class="dc-label">天井まで</span>
                    <span class="dc-value" id="dcRemaining">-</span>
                </div>
                <div class="detail-card">
                    <span class="dc-label">天井到達コスト（目安）</span>
                    <span class="dc-value" id="dcCost">-</span>
                </div>
                <div class="detail-card">
                    <span class="dc-label">天井恩恵</span>
                    <span class="dc-value" id="dcBenefit">-</span>
                </div>
                <div class="detail-card">
                    <span class="dc-label">推奨やめ時</span>
                    <span class="dc-value" id="dcQuit">-</span>
                </div>
            </div>

            <div class="ev-table-section" id="evTableSection">
                <button class="ev-table-toggle" onclick="toggleEvTable()">&#9662; 期待値テーブルを表示</button>
                <div class="ev-table-wrap" id="evTableWrap">
                    <table class="ev-table" id="evTable"></table>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 JunGames
    </div>

    <script>
        let machines = [];
        let selectedMachine = null;
        let exchangeRate = 'equal';

        // Load data
        fetch('data/machines.json')
            .then(r => r.json())
            .then(data => {
                machines = data;
                renderMachineList(machines);
                renderRecent();
            });

        // Search
        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value.trim().toLowerCase();
            if (!q) {
                renderMachineList(machines);
                document.getElementById('recentSection').style.display = getRecent().length ? '' : 'none';
                document.getElementById('allTitle').textContent = '全機種';
                return;
            }
            const filtered = machines.filter(m =>
                m.name.toLowerCase().includes(q) ||
                m.maker.toLowerCase().includes(q)
            );
            renderMachineList(filtered);
            document.getElementById('recentSection').style.display = 'none';
            document.getElementById('allTitle').textContent = '検索結果';
        });

        // Exchange rate
        function setExchangeRate(rate) {
            exchangeRate = rate;
            document.querySelectorAll('.exchange-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.rate === rate);
            });
            localStorage.setItem('neraime_rate', rate);
        }

        // Init exchange rate
        const savedRate = localStorage.getItem('neraime_rate');
        if (savedRate) setExchangeRate(savedRate);

        // Render machine list
        function renderMachineList(list) {
            const el = document.getElementById('machineList');
            if (list.length === 0) {
                el.innerHTML = '<div class="no-results">該当する機種がありません</div>';
                return;
            }
            el.innerHTML = list.map(m => `
                <div class="machine-item" onclick="selectMachine('${m.id}')">
                    <div class="name">${m.name}</div>
                    <div class="meta">${m.maker} / ${m.category} / ${m.spec}</div>
                    <div class="ceiling">天井: ${m.ceilingGame}G${m.ceilingGameReset ? '（リセット後: ' + m.ceilingGameReset + 'G）' : ''}</div>
                </div>
            `).join('');
        }

        // Recent machines
        function getRecent() {
            try {
                return JSON.parse(localStorage.getItem('neraime_recent') || '[]');
            } catch { return []; }
        }
        function addRecent(id) {
            let recent = getRecent().filter(r => r !== id);
            recent.unshift(id);
            if (recent.length > 5) recent = recent.slice(0, 5);
            localStorage.setItem('neraime_recent', JSON.stringify(recent));
        }
        function renderRecent() {
            const recent = getRecent();
            const section = document.getElementById('recentSection');
            const list = document.getElementById('recentList');
            if (recent.length === 0) {
                section.style.display = 'none';
                return;
            }
            section.style.display = '';
            const recentMachines = recent.map(id => machines.find(m => m.id === id)).filter(Boolean);
            list.innerHTML = recentMachines.map(m => `
                <div class="machine-item" onclick="selectMachine('${m.id}')">
                    <div class="name">${m.name}</div>
                    <div class="meta">${m.maker} / ${m.ceiling || ''}天井: ${m.ceilingGame}G</div>
                </div>
            `).join('');
        }

        // Select machine
        function selectMachine(id) {
            selectedMachine = machines.find(m => m.id === id);
            if (!selectedMachine) return;
            addRecent(id);

            document.getElementById('selectScreen').classList.add('hidden');
            document.getElementById('judgeScreen').classList.add('active');

            // Machine info
            const info = document.getElementById('machineInfo');
            info.innerHTML = `
                <h2>${selectedMachine.name}</h2>
                <div class="info-row"><span class="info-label">メーカー</span><span>${selectedMachine.maker}</span></div>
                <div class="info-row"><span class="info-label">天井</span><span>${selectedMachine.ceilingGame}G</span></div>
                <div class="info-row"><span class="info-label">天井恩恵</span><span>${selectedMachine.ceilingBenefit}</span></div>
            `;

            // Reset
            document.getElementById('gameCountInput').value = '';
            document.getElementById('result').className = 'result';
            document.getElementById('detailCards').className = 'detail-cards';
            document.getElementById('zoneAlert').className = 'zone-alert';
            document.getElementById('evTableSection').className = 'ev-table-section';
            document.getElementById('gameCountInput').focus();
        }

        // Go back
        function goBack() {
            document.getElementById('selectScreen').classList.remove('hidden');
            document.getElementById('judgeScreen').classList.remove('active');
            renderRecent();
        }

        // Interpolate EV
        function getEV(gameCount) {
            const table = selectedMachine.evTable[exchangeRate];
            if (!table) return null;

            const keys = Object.keys(table).map(Number).sort((a, b) => a - b);
            if (gameCount <= keys[0]) return table[keys[0]];
            if (gameCount >= keys[keys.length - 1]) return table[keys[keys.length - 1]];

            for (let i = 0; i < keys.length - 1; i++) {
                if (gameCount >= keys[i] && gameCount <= keys[i + 1]) {
                    const ratio = (gameCount - keys[i]) / (keys[i + 1] - keys[i]);
                    return Math.round(table[keys[i]] + (table[keys[i + 1]] - table[keys[i]]) * ratio);
                }
            }
            return null;
        }

        // Judge
        function judge() {
            const gameCount = parseInt(document.getElementById('gameCountInput').value);
            if (isNaN(gameCount) || gameCount < 0) {
                document.getElementById('gameCountInput').focus();
                return;
            }

            const ev = getEV(gameCount);
            if (ev === null) return;

            const result = document.getElementById('result');
            const label = document.getElementById('resultLabel');
            const sub = document.getElementById('resultSub');
            const evEl = document.getElementById('resultEv');

            let cls, text, subText;
            if (ev >= 2000) {
                cls = 'go'; text = 'GO'; subText = '積極的に打て！';
            } else if (ev >= 500) {
                cls = 'wait'; text = 'WAIT'; subText = '条件次第で狙える';
            } else {
                cls = 'stop'; text = 'STOP'; subText = 'やめておけ';
            }

            result.className = 'result show ' + cls;
            label.textContent = text;
            sub.textContent = subText;
            evEl.textContent = (ev >= 0 ? '+' : '') + ev.toLocaleString() + '円';

            // Detail cards
            const remaining = selectedMachine.ceilingGame - gameCount;
            const cost = Math.max(0, Math.round(remaining / 31.5 * 1000));
            document.getElementById('dcRemaining').textContent = remaining > 0 ? remaining + 'G' : '天井超過';
            document.getElementById('dcCost').textContent = '約' + cost.toLocaleString() + '円';
            document.getElementById('dcBenefit').textContent = selectedMachine.ceilingBenefit;
            document.getElementById('dcQuit').textContent = selectedMachine.quitTiming;
            document.getElementById('detailCards').className = 'detail-cards show';

            // Zone alert
            const zoneAlert = document.getElementById('zoneAlert');
            const nearZones = (selectedMachine.zones || []).filter(z =>
                gameCount >= z.from - 30 && gameCount <= z.to + 10
            );
            if (nearZones.length > 0) {
                document.getElementById('zoneTitle').textContent = 'ZONE情報';
                document.getElementById('zoneDetail').textContent = nearZones.map(z =>
                    `${z.from}〜${z.to}G: ${z.note}`
                ).join(' / ');
                zoneAlert.className = 'zone-alert show';
            } else {
                zoneAlert.className = 'zone-alert';
            }

            // EV Table
            renderEvTable(gameCount);
            document.getElementById('evTableSection').className = 'ev-table-section show';
        }

        // EV Table
        function renderEvTable(currentG) {
            const table = selectedMachine.evTable[exchangeRate];
            if (!table) return;
            const keys = Object.keys(table).map(Number).sort((a, b) => a - b);
            const rateName = exchangeRate === 'equal' ? '等価' : '5.6枚';

            let html = `<tr><th>G数</th><th>期待値（${rateName}）</th></tr>`;
            keys.forEach(g => {
                const v = table[g];
                const isCurrent = currentG >= g && (keys.indexOf(g) === keys.length - 1 || currentG < keys[keys.indexOf(g) + 1]);
                const cls = isCurrent ? ' class="current"' : '';
                const evCls = v >= 0 ? 'ev-plus' : 'ev-minus';
                html += `<tr${cls}><td>${g}G</td><td class="${evCls}">${v >= 0 ? '+' : ''}${v.toLocaleString()}円</td></tr>`;
            });
            document.getElementById('evTable').innerHTML = html;
        }

        function toggleEvTable() {
            const wrap = document.getElementById('evTableWrap');
            const btn = document.querySelector('.ev-table-toggle');
            if (wrap.classList.contains('open')) {
                wrap.classList.remove('open');
                btn.innerHTML = '&#9662; 期待値テーブルを表示';
            } else {
                wrap.classList.add('open');
                btn.innerHTML = '&#9652; 期待値テーブルを閉じる';
            }
        }

        // Enter key to judge
        document.getElementById('gameCountInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') judge();
        });
    </script>
</body>
</html>
